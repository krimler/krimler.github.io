<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#f0abfc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- mirror axis: two different-looking forms that are the same under reflection -->
  <line x1="600" y1="80" x2="600" y2="550" stroke="#475569" stroke-width="2" stroke-dasharray="6 8"/>
  <g fill="none" stroke="url(#ink)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 430 L250 230 L360 230 Q430 230 430 300 Q430 360 360 360 L300 360 L430 430"/>
    <path d="M950 430 L950 230 L840 230 Q770 230 770 300 Q770 360 840 360 L900 360 L770 430" transform="translate(0,0)"/>
  </g>
  <circle cx="600" cy="315" r="14" fill="#f0abfc"/>
  <text x="600" y="150" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#e2e8f0" font-style="italic">two objectives, one canonical form</text>
  <text x="600" y="600" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#94a3b8" letter-spacing="3">KRIMLER · RLHF · PREFERENCE OPTIMIZATION</text>
</svg>
