      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f3b3a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="600" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#e2e8f0" font-style="italic">where does the measurement start?</text>
